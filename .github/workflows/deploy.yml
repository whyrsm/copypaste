name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bunx tsc --noEmit

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [ci]

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 120s
          script: |
            set -e
            echo "=== Starting deploy ==="
            cd /opt/copypaste
            git pull origin main
            echo "=== Installing dependencies ==="
            bun install
            echo "=== Restarting service ==="
            sudo systemctl restart copypaste.service
            sleep 5
            sudo systemctl is-active copypaste.service
            echo "=== Deploy complete ==="
